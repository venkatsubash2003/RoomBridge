apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: roombridge-api
spec:
  minAvailable: 2
  selector:
    matchLabels: { app: roombridge-api }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: roombridge-api
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: roombridge-api }
  minReplicas: 3
  maxReplicas: 20
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 65 }

apiVersion: apps/v1
kind: Deployment
metadata:
  name: roombridge-worker
spec:
  replicas: 2
  selector:
    matchLabels: { app: roombridge-worker }
  template:
    metadata:
      labels: { app: roombridge-worker }
    spec:
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: worker
          image: ROOMBRIDGE_IMAGE
          command: ["node", "server/worker.js"]
          envFrom:
            - configMapRef: { name: roombridge }
            - secretRef: { name: roombridge-secrets }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }

apiVersion: apps/v1
kind: Deployment
metadata:
  name: roombridge-api
spec:
  replicas: 3
  selector:
    matchLabels: { app: roombridge-api }
  template:
    metadata:
      labels: { app: roombridge-api }
    spec:
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: api
          image: ROOMBRIDGE_IMAGE
          ports: [{ name: http, containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: roombridge }
            - secretRef: { name: roombridge-secrets }
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health/live, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: roombridge-api
spec:
  selector: { app: roombridge-api }
  ports: [{ name: http, port: 80, targetPort: http }]

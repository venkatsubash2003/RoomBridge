name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --ignore-scripts
      - run: npm audit --audit-level=high
      - run: npm run verify
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: docker build -t roombridge:${{ github.sha }} .
  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: roombridge
          POSTGRES_PASSWORD: roombridge
          POSTGRES_DB: roombridge_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U roombridge -d roombridge_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://roombridge:roombridge@127.0.0.1:5432/roombridge_test
      DATABASE_SSL: "false"
      REDIS_URL: redis://127.0.0.1:6379
      PORT: "8080"
      PUBLIC_ORIGIN: http://localhost:8080
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --ignore-scripts
      - name: PostgreSQL and Redis API smoke test
        run: |
          node server/server.js > server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"; cat server.log' EXIT
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:8080/api/health && break
            sleep 1
          done
          npm run test:api
